name: legaleasier
description: AI-powered app that translates Indonesian legal documents into plain language.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # Navigation
  go_router: ^14.0.0

  # HTTP client
  dio: ^5.4.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.0

  # UI
  flutter_svg: ^2.0.0
  smooth_page_indicator: ^1.2.0
  lottie: ^3.1.0
  google_fonts: ^6.2.0

  # File / camera picker
  file_picker: ^8.0.0
  image_picker: ^1.1.2

  # Storage
  shared_preferences: ^2.3.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
